
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM – Login</title>
  /styles.css
</head>
<body>
  <div class="login-container">
    <div class="brand">
      <img src="/logo.svg" alt="CRM Logo" class     <p class="subtitle">Sign in to continue</p>
    </div>

    <form id="loginForm" method="POST" action="/authabel for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required placeholder="you@company.com" />
        <small class="error" data-for="email"></small>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••" minlength="6"/>
        <small class="error" data-for="password"></small>
      </div>

      <button type="submit" class="btn">Sign In</button>

      <div class="server-error" id="serverError" hidden></div>
    </form>

    <footer>
      <small>© <span id="year"></span> Your Company. All rights reserved.</small>
    </footer>
  </div>

  <script src="/main.jsody>
</html>
